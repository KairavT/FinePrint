<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FinePrint</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700&family=JetBrains+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-primary: #0a0a0c;
            --bg-secondary: #111116;
            --bg-card: #16161d;
            --bg-card-hover: #1c1c25;
            --bg-surface: #1e1e28;
            --border: #2a2a38;
            --border-subtle: #1f1f2c;
            --text-primary: #e8e6f0;
            --text-secondary: #9896a8;
            --text-muted: #6b6980;
            --accent: #7c6aef;
            --accent-soft: rgba(124, 106, 239, 0.12);
            --accent-glow: rgba(124, 106, 239, 0.25);
            --risk-high: #ef4444;
            --risk-high-bg: rgba(239, 68, 68, 0.1);
            --risk-high-border: rgba(239, 68, 68, 0.25);
            --risk-medium: #f59e0b;
            --risk-medium-bg: rgba(245, 158, 11, 0.1);
            --risk-medium-border: rgba(245, 158, 11, 0.25);
            --risk-low: #22c55e;
            --risk-low-bg: rgba(34, 197, 94, 0.1);
            --risk-low-border: rgba(34, 197, 94, 0.25);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }
        .serif { font-family: 'Instrument Serif', serif; }

        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* Animations */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.6; }
            50% { transform: scale(1.1); opacity: 0.2; }
            100% { transform: scale(0.8); opacity: 0.6; }
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
        .animate-fade-up {
            animation: fadeUp 0.5s ease-out forwards;
            opacity: 0;
        }
        .shimmer-bg {
            background: linear-gradient(90deg, var(--bg-card) 0%, var(--bg-surface) 50%, var(--bg-card) 100%);
            background-size: 200% 100%;
            animation: shimmer 1.8s ease-in-out infinite;
        }

        /* Noise texture overlay */
        .noise-overlay::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        /* Glow effect */
        .glow-orb {
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
        }
    </style>
</head>
<body class="noise-overlay">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useCallback, useEffect } = React;

        // ---- Config ----
        // Empty string = same origin (correct for Railway single-service deploy)
        const API_URL = "";

        // ---- Icons (inline SVG components) ----
        const ShieldIcon = ({size = 20, className = ""}) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
        );

        const UploadIcon = ({size = 20}) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
        );

        const AlertIcon = ({size = 16}) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
            </svg>
        );

        const CheckIcon = ({size = 16}) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12"/>
            </svg>
        );

        const FileIcon = ({size = 20}) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
            </svg>
        );

        const XIcon = ({size = 16}) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
        );

        const ChevronDown = ({size = 16}) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="6 9 12 15 18 9"/>
            </svg>
        );

        // ---- Risk Level Styling ----
        const riskStyles = {
            high: {
                color: 'var(--risk-high)',
                bg: 'var(--risk-high-bg)',
                border: 'var(--risk-high-border)',
                label: 'High Risk',
            },
            medium: {
                color: 'var(--risk-medium)',
                bg: 'var(--risk-medium-bg)',
                border: 'var(--risk-medium-border)',
                label: 'Medium Risk',
            },
            low: {
                color: 'var(--risk-low)',
                bg: 'var(--risk-low-bg)',
                border: 'var(--risk-low-border)',
                label: 'Low Risk',
            },
        };

        // ---- Risk Score Gauge ----
        function RiskGauge({ score }) {
            const pct = (score / 10) * 100;
            const color = score >= 7 ? 'var(--risk-high)' : score >= 4 ? 'var(--risk-medium)' : 'var(--risk-low)';
            const label = score >= 7 ? 'High Risk' : score >= 4 ? 'Moderate Risk' : 'Low Risk';
            const circumference = 2 * Math.PI * 54;
            const dashOffset = circumference - (pct / 100) * circumference;

            return (
                <div style={{ textAlign: 'center' }}>
                    <div style={{ position: 'relative', width: 160, height: 160, margin: '0 auto' }}>
                        <svg width="160" height="160" viewBox="0 0 120 120" style={{ transform: 'rotate(-90deg)' }}>
                            <circle cx="60" cy="60" r="54" fill="none" stroke="var(--border)" strokeWidth="8" />
                            <circle
                                cx="60" cy="60" r="54" fill="none"
                                stroke={color} strokeWidth="8"
                                strokeLinecap="round"
                                strokeDasharray={circumference}
                                strokeDashoffset={dashOffset}
                                style={{ transition: 'stroke-dashoffset 1.2s ease-out' }}
                            />
                        </svg>
                        <div style={{
                            position: 'absolute', inset: 0,
                            display: 'flex', flexDirection: 'column',
                            alignItems: 'center', justifyContent: 'center',
                        }}>
                            <span className="mono" style={{ fontSize: 36, fontWeight: 700, color, lineHeight: 1 }}>
                                {score}
                            </span>
                            <span className="mono" style={{ fontSize: 12, color: 'var(--text-muted)', marginTop: 2 }}>
                                / 10
                            </span>
                        </div>
                    </div>
                    <div className="mono" style={{
                        marginTop: 12, fontSize: 13, fontWeight: 600,
                        color, textTransform: 'uppercase', letterSpacing: '0.08em',
                    }}>
                        {label}
                    </div>
                </div>
            );
        }

        // ---- Risk Badge ----
        function RiskBadge({ level }) {
            const s = riskStyles[level] || riskStyles.low;
            return (
                <span className="mono" style={{
                    display: 'inline-flex', alignItems: 'center', gap: 5,
                    padding: '3px 10px', borderRadius: 6,
                    background: s.bg, border: `1px solid ${s.border}`,
                    color: s.color, fontSize: 11, fontWeight: 600,
                    textTransform: 'uppercase', letterSpacing: '0.05em',
                }}>
                    {level === 'high' && <AlertIcon size={12} />}
                    {level === 'medium' && <AlertIcon size={12} />}
                    {level === 'low' && <CheckIcon size={12} />}
                    {s.label}
                </span>
            );
        }

        // ---- Category Badge ----
        function CategoryBadge({ category }) {
            return (
                <span className="mono" style={{
                    display: 'inline-block', padding: '3px 10px', borderRadius: 6,
                    background: 'var(--accent-soft)', border: '1px solid rgba(124,106,239,0.2)',
                    color: 'var(--accent)', fontSize: 11, fontWeight: 500,
                    letterSpacing: '0.03em',
                }}>
                    {category}
                </span>
            );
        }

        // ---- Clause Card ----
        function ClauseCard({ clause, index }) {
            const [expanded, setExpanded] = useState(false);
            const rs = riskStyles[clause.risk_level] || riskStyles.low;

            return (
                <div
                    className="animate-fade-up"
                    style={{
                        animationDelay: `${index * 60}ms`,
                        background: 'var(--bg-card)',
                        border: `1px solid ${clause.risk_level === 'high' ? rs.border : 'var(--border-subtle)'}`,
                        borderRadius: 12, padding: 20,
                        transition: 'border-color 0.2s, background 0.2s',
                        cursor: 'pointer',
                    }}
                    onClick={() => setExpanded(!expanded)}
                    onMouseEnter={e => { e.currentTarget.style.background = 'var(--bg-card-hover)'; }}
                    onMouseLeave={e => { e.currentTarget.style.background = 'var(--bg-card)'; }}
                >
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 12, marginBottom: 10 }}>
                        <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', alignItems: 'center' }}>
                            <span className="mono" style={{ color: 'var(--text-muted)', fontSize: 12 }}>§{clause.index + 1}</span>
                            <CategoryBadge category={clause.category} />
                            <RiskBadge level={clause.risk_level} />
                        </div>
                        <div style={{
                            transform: expanded ? 'rotate(180deg)' : 'rotate(0)',
                            transition: 'transform 0.2s', color: 'var(--text-muted)',
                            flexShrink: 0,
                        }}>
                            <ChevronDown size={18} />
                        </div>
                    </div>

                    <p style={{ color: 'var(--text-secondary)', fontSize: 14, lineHeight: 1.65, marginBottom: expanded ? 14 : 0 }}>
                        {clause.explanation}
                    </p>

                    {clause.risk_reason && (
                        <div style={{
                            display: 'flex', alignItems: 'flex-start', gap: 8,
                            padding: '8px 12px', borderRadius: 8,
                            background: rs.bg, marginBottom: expanded ? 14 : 0,
                            fontSize: 13, color: rs.color,
                        }}>
                            <AlertIcon size={14} />
                            <span>{clause.risk_reason}</span>
                        </div>
                    )}

                    {expanded && (
                        <div style={{
                            marginTop: 12, padding: 16, borderRadius: 8,
                            background: 'var(--bg-primary)',
                            border: '1px solid var(--border-subtle)',
                            maxHeight: 300, overflowY: 'auto',
                        }}>
                            <div className="mono" style={{ fontSize: 10, color: 'var(--text-muted)', marginBottom: 8, textTransform: 'uppercase', letterSpacing: '0.1em' }}>
                                Original Text
                            </div>
                            <p style={{ fontSize: 13, color: 'var(--text-secondary)', lineHeight: 1.7, whiteSpace: 'pre-wrap' }}>
                                {clause.original_text}
                            </p>
                        </div>
                    )}
                </div>
            );
        }

        // ---- Loading Skeleton ----
        function LoadingSkeleton() {
            return (
                <div style={{ maxWidth: 800, margin: '0 auto', padding: '40px 20px' }}>
                    <div style={{ textAlign: 'center', marginBottom: 48 }}>
                        <div style={{
                            width: 64, height: 64, borderRadius: '50%', margin: '0 auto 20px',
                            background: 'var(--accent-soft)', display: 'flex', alignItems: 'center', justifyContent: 'center',
                        }}>
                            <div style={{ animation: 'float 2s ease-in-out infinite' }}>
                                <ShieldIcon size={28} className="" />
                            </div>
                        </div>
                        <p style={{ color: 'var(--text-secondary)', fontSize: 15 }}>
                            Analyzing your document...
                        </p>
                        <p className="mono" style={{ color: 'var(--text-muted)', fontSize: 12, marginTop: 6 }}>
                            Segmenting clauses · Classifying risks · Generating summary
                        </p>
                    </div>
                    {[1,2,3,4].map(i => (
                        <div key={i} className="shimmer-bg" style={{
                            height: 96, borderRadius: 12, marginBottom: 12,
                        }} />
                    ))}
                </div>
            );
        }

        // ---- Summary Section ----
        function SummarySection({ title, items, icon }) {
            if (!items || items.length === 0) return null;
            return (
                <div style={{
                    background: 'var(--bg-card)', border: '1px solid var(--border-subtle)',
                    borderRadius: 12, padding: 20, marginBottom: 16,
                }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 14 }}>
                        {icon}
                        <h3 style={{ fontSize: 15, fontWeight: 600 }}>{title}</h3>
                    </div>
                    <ul style={{ listStyle: 'none', padding: 0 }}>
                        {items.map((item, i) => (
                            <li key={i} style={{
                                display: 'flex', alignItems: 'flex-start', gap: 10,
                                padding: '8px 0',
                                borderBottom: i < items.length - 1 ? '1px solid var(--border-subtle)' : 'none',
                            }}>
                                <span style={{ color: 'var(--accent)', marginTop: 3, flexShrink: 0 }}>›</span>
                                <span style={{ fontSize: 14, color: 'var(--text-secondary)', lineHeight: 1.6 }}>{item}</span>
                            </li>
                        ))}
                    </ul>
                </div>
            );
        }

        // ---- Stats Bar ----
        function StatsBar({ clauses }) {
            const high = clauses.filter(c => c.risk_level === 'high').length;
            const medium = clauses.filter(c => c.risk_level === 'medium').length;
            const low = clauses.filter(c => c.risk_level === 'low').length;

            const stats = [
                { label: 'High Risk', count: high, color: 'var(--risk-high)', bg: 'var(--risk-high-bg)' },
                { label: 'Medium Risk', count: medium, color: 'var(--risk-medium)', bg: 'var(--risk-medium-bg)' },
                { label: 'Low Risk', count: low, color: 'var(--risk-low)', bg: 'var(--risk-low-bg)' },
            ];

            return (
                <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap' }}>
                    {stats.map(s => (
                        <div key={s.label} style={{
                            flex: '1 1 120px', padding: '14px 16px', borderRadius: 10,
                            background: s.bg, border: `1px solid ${s.color}22`,
                            textAlign: 'center',
                        }}>
                            <div className="mono" style={{ fontSize: 28, fontWeight: 700, color: s.color }}>
                                {s.count}
                            </div>
                            <div className="mono" style={{ fontSize: 11, color: s.color, opacity: 0.8, marginTop: 2 }}>
                                {s.label}
                            </div>
                        </div>
                    ))}
                </div>
            );
        }

        // ---- Filter Tabs ----
        function FilterTabs({ active, onChange, counts }) {
            const tabs = [
                { key: 'all', label: 'All Clauses' },
                { key: 'high', label: 'High Risk' },
                { key: 'medium', label: 'Medium Risk' },
                { key: 'low', label: 'Low Risk' },
            ];
            return (
                <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                    {tabs.map(t => {
                        const isActive = active === t.key;
                        const rColor = t.key !== 'all' ? riskStyles[t.key]?.color : 'var(--accent)';
                        return (
                            <button
                                key={t.key}
                                onClick={() => onChange(t.key)}
                                className="mono"
                                style={{
                                    padding: '7px 14px', borderRadius: 8,
                                    border: `1px solid ${isActive ? rColor : 'var(--border)'}`,
                                    background: isActive ? `${rColor}18` : 'transparent',
                                    color: isActive ? rColor : 'var(--text-muted)',
                                    fontSize: 12, fontWeight: 500, cursor: 'pointer',
                                    transition: 'all 0.15s',
                                }}
                            >
                                {t.label}
                                {counts[t.key] !== undefined && (
                                    <span style={{ marginLeft: 6, opacity: 0.7 }}>
                                        {counts[t.key]}
                                    </span>
                                )}
                            </button>
                        );
                    })}
                </div>
            );
        }

        // ---- Results View ----
        function ResultsView({ data, onReset }) {
            const [filter, setFilter] = useState('all');

            const filteredClauses = filter === 'all'
                ? data.clauses
                : data.clauses.filter(c => c.risk_level === filter);

            const counts = {
                all: data.clauses.length,
                high: data.clauses.filter(c => c.risk_level === 'high').length,
                medium: data.clauses.filter(c => c.risk_level === 'medium').length,
                low: data.clauses.filter(c => c.risk_level === 'low').length,
            };

            return (
                <div style={{ maxWidth: 900, margin: '0 auto', padding: '32px 20px 80px' }}>
                    {/* Header */}
                    <div className="animate-fade-up" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 32 }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                            <div style={{ color: 'var(--accent)' }}><ShieldIcon size={24} /></div>
                            <h1 style={{ fontSize: 22, fontWeight: 600 }}>Analysis Complete</h1>
                        </div>
                        <button
                            onClick={onReset}
                            style={{
                                padding: '8px 18px', borderRadius: 8,
                                border: '1px solid var(--border)',
                                background: 'transparent', color: 'var(--text-secondary)',
                                fontSize: 13, cursor: 'pointer', transition: 'all 0.15s',
                            }}
                            onMouseEnter={e => { e.currentTarget.style.borderColor = 'var(--accent)'; e.currentTarget.style.color = 'var(--accent)'; }}
                            onMouseLeave={e => { e.currentTarget.style.borderColor = 'var(--border)'; e.currentTarget.style.color = 'var(--text-secondary)'; }}
                        >
                            Scan Another
                        </button>
                    </div>

                    {/* Score + Stats Row */}
                    <div className="animate-fade-up" style={{ animationDelay: '100ms', display: 'grid', gridTemplateColumns: '200px 1fr', gap: 20, marginBottom: 28, alignItems: 'center' }}>
                        <div style={{
                            background: 'var(--bg-card)', border: '1px solid var(--border-subtle)',
                            borderRadius: 14, padding: '24px 16px',
                        }}>
                            <RiskGauge score={data.risk_score.score} />
                        </div>
                        <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
                            <StatsBar clauses={data.clauses} />
                            <div style={{
                                background: 'var(--bg-card)', border: '1px solid var(--border-subtle)',
                                borderRadius: 10, padding: '14px 16px',
                            }}>
                                <div className="mono" style={{ fontSize: 10, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '0.1em', marginBottom: 8 }}>
                                    Risk Factors
                                </div>
                                {data.risk_score.factors.map((f, i) => (
                                    <div key={i} style={{ fontSize: 13, color: 'var(--text-secondary)', lineHeight: 1.5 }}>
                                        • {f}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* Metadata */}
                    <div className="animate-fade-up mono" style={{
                        animationDelay: '150ms',
                        display: 'flex', gap: 20, marginBottom: 28,
                        fontSize: 12, color: 'var(--text-muted)',
                    }}>
                        <span>{data.metadata.word_count.toLocaleString()} words</span>
                        <span>•</span>
                        <span>{data.metadata.clause_count} clauses</span>
                        <span>•</span>
                        <span>{data.metadata.processing_time_seconds}s</span>
                        <span>•</span>
                        <span>{data.metadata.source_type.toUpperCase()}</span>
                    </div>

                    {/* Summary Sections */}
                    <div className="animate-fade-up" style={{ animationDelay: '200ms', marginBottom: 28 }}>
                        <SummarySection
                            title="Document Overview"
                            items={data.summary.overview}
                            icon={<FileIcon size={18} />}
                        />
                        <SummarySection
                            title="Most Concerning Clauses"
                            items={data.summary.most_concerning}
                            icon={<span style={{ color: 'var(--risk-high)' }}><AlertIcon size={18} /></span>}
                        />
                        <SummarySection
                            title="Key User Obligations"
                            items={data.summary.key_obligations}
                            icon={<span style={{ color: 'var(--risk-medium)' }}><AlertIcon size={18} /></span>}
                        />
                    </div>

                    {/* Clause List */}
                    <div className="animate-fade-up" style={{ animationDelay: '250ms' }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16, flexWrap: 'wrap', gap: 12 }}>
                            <h2 style={{ fontSize: 18, fontWeight: 600 }}>Clause Analysis</h2>
                            <FilterTabs active={filter} onChange={setFilter} counts={counts} />
                        </div>
                        <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                            {filteredClauses.map((clause, i) => (
                                <ClauseCard key={clause.index} clause={clause} index={i} />
                            ))}
                            {filteredClauses.length === 0 && (
                                <div style={{ textAlign: 'center', padding: 40, color: 'var(--text-muted)' }}>
                                    No clauses matching this filter.
                                </div>
                            )}
                        </div>
                    </div>

                    {/* Disclaimer */}
                    <div className="animate-fade-up" style={{
                        animationDelay: '300ms',
                        marginTop: 40, padding: 16, borderRadius: 10,
                        background: 'var(--bg-card)', border: '1px solid var(--border-subtle)',
                        textAlign: 'center',
                    }}>
                        <p style={{ fontSize: 12, color: 'var(--text-muted)', lineHeight: 1.6 }}>
                            This analysis is generated by AI and rule-based pattern detection. It does not constitute legal advice.
                            Consult a qualified attorney for legal interpretation of any terms and conditions.
                        </p>
                    </div>
                </div>
            );
        }

        // ---- Main App ----
        function App() {
            const [mode, setMode] = useState('input');  // input | loading | results | error
            const [inputMode, setInputMode] = useState('paste'); // paste | upload
            const [text, setText] = useState('');
            const [file, setFile] = useState(null);
            const [result, setResult] = useState(null);
            const [error, setError] = useState('');
            const fileInputRef = useRef(null);
            const textAreaRef = useRef(null);

            const handleAnalyze = useCallback(() => {
                setMode('loading');
                setError('');

                try {
                    if (inputMode === 'upload' && !file) {
                        throw new Error('Please select a PDF file to analyze.');
                    }
                    if (inputMode === 'paste' && !text.trim()) {
                        throw new Error('Please paste some text to analyze.');
                    }

                    const xhr = new XMLHttpRequest();
                    xhr.open('POST', `${API_URL}/api/analyze`, true);

                    xhr.onload = function() {
                        try {
                            const data = JSON.parse(xhr.responseText);
                            if (xhr.status >= 200 && xhr.status < 300) {
                                setResult(data);
                                setMode('results');
                            } else {
                                setError(data.detail || `Server error: ${xhr.status}`);
                                setMode('error');
                            }
                        } catch (e) {
                            setError(`Failed to parse response: ${e.message}`);
                            setMode('error');
                        }
                    };

                    xhr.onerror = function() {
                        setError('Network error. Check your connection or try again.');
                        setMode('error');
                    };

                    xhr.ontimeout = function() {
                        setError('Request timed out. The document may be too large.');
                        setMode('error');
                    };

                    xhr.timeout = 120000; // 2 min timeout for large docs

                    const formData = new FormData();
                    if (inputMode === 'upload' && file) {
                        formData.append('file', file);
                    } else {
                        formData.append('text', text);
                    }
                    xhr.send(formData);

                } catch (err) {
                    setError(err.message || 'An unexpected error occurred.');
                    setMode('error');
                }
            }, [inputMode, file, text]);

            const handleReset = () => {
                setMode('input');
                setText('');
                setFile(null);
                setResult(null);
                setError('');
            };

            const handleFileDrop = useCallback((e) => {
                e.preventDefault();
                const f = e.dataTransfer?.files?.[0];
                if (f && f.name.toLowerCase().endsWith('.pdf')) {
                    setFile(f);
                    setInputMode('upload');
                }
            }, []);

            const canSubmit = (inputMode === 'paste' && text.trim().length > 50)
                           || (inputMode === 'upload' && file);

            if (mode === 'loading') return <LoadingSkeleton />;
            if (mode === 'results' && result) return <ResultsView data={result} onReset={handleReset} />;

            return (
                <div style={{ position: 'relative', minHeight: '100vh', overflow: 'hidden' }}>
                    {/* Background glow */}
                    <div className="glow-orb" style={{ top: '-250px', left: '50%', transform: 'translateX(-50%)' }} />

                    <div style={{ position: 'relative', zIndex: 1, maxWidth: 720, margin: '0 auto', padding: '60px 20px 80px' }}>
                        {/* Hero */}
                        <div className="animate-fade-up" style={{ textAlign: 'center', marginBottom: 48 }}>
                            <div style={{
                                width: 72, height: 72, borderRadius: 18, margin: '0 auto 24px',
                                background: 'var(--accent-soft)',
                                border: '1px solid rgba(124,106,239,0.2)',
                                display: 'flex', alignItems: 'center', justifyContent: 'center',
                                color: 'var(--accent)',
                            }}>
                                <ShieldIcon size={32} />
                            </div>
                            <h1 className="serif" style={{
                                fontSize: 44, fontWeight: 400, lineHeight: 1.15,
                                letterSpacing: '-0.02em', marginBottom: 14,
                            }}>
                                FinePrint
                            </h1>
                            <p style={{
                                fontSize: 16, color: 'var(--text-secondary)',
                                lineHeight: 1.6, maxWidth: 480, margin: '0 auto',
                            }}>
                                Upload or paste a Terms & Conditions document. Our AI will identify
                                risky clauses, classify them, and give you a plain-English breakdown.
                            </p>
                        </div>

                        {/* Input Mode Tabs */}
                        <div className="animate-fade-up" style={{
                            animationDelay: '100ms',
                            display: 'flex', gap: 4, marginBottom: 16,
                            background: 'var(--bg-secondary)', borderRadius: 10, padding: 4,
                            width: 'fit-content',
                        }}>
                            {[
                                { key: 'paste', label: 'Paste Text' },
                                { key: 'upload', label: 'Upload PDF' },
                            ].map(t => (
                                <button
                                    key={t.key}
                                    onClick={() => setInputMode(t.key)}
                                    className="mono"
                                    style={{
                                        padding: '8px 20px', borderRadius: 8,
                                        border: 'none',
                                        background: inputMode === t.key ? 'var(--bg-card)' : 'transparent',
                                        color: inputMode === t.key ? 'var(--text-primary)' : 'var(--text-muted)',
                                        fontSize: 13, fontWeight: 500, cursor: 'pointer',
                                        transition: 'all 0.15s',
                                    }}
                                >
                                    {t.label}
                                </button>
                            ))}
                        </div>

                        {/* Text Input */}
                        {inputMode === 'paste' && (
                            <div className="animate-fade-up" style={{ animationDelay: '150ms' }}>
                                <textarea
                                    ref={textAreaRef}
                                    value={text}
                                    onChange={e => setText(e.target.value)}
                                    placeholder="Paste the full Terms & Conditions text here..."
                                    style={{
                                        width: '100%', minHeight: 320, padding: 20,
                                        background: 'var(--bg-card)', border: '1px solid var(--border)',
                                        borderRadius: 12, color: 'var(--text-primary)',
                                        fontSize: 14, lineHeight: 1.7, resize: 'vertical',
                                        fontFamily: 'DM Sans, sans-serif',
                                        outline: 'none', transition: 'border-color 0.2s',
                                    }}
                                    onFocus={e => e.target.style.borderColor = 'var(--accent)'}
                                    onBlur={e => e.target.style.borderColor = 'var(--border)'}
                                />
                                <div className="mono" style={{
                                    textAlign: 'right', fontSize: 12,
                                    color: text.split(/\s+/).filter(Boolean).length > 20000 ? 'var(--risk-high)' : 'var(--text-muted)',
                                    marginTop: 6,
                                }}>
                                    {text.split(/\s+/).filter(Boolean).length.toLocaleString()} / 20,000 words
                                </div>
                            </div>
                        )}

                        {/* File Upload */}
                        {inputMode === 'upload' && (
                            <div
                                className="animate-fade-up"
                                style={{ animationDelay: '150ms' }}
                                onDragOver={e => e.preventDefault()}
                                onDrop={handleFileDrop}
                            >
                                <div
                                    onClick={() => fileInputRef.current?.click()}
                                    style={{
                                        padding: 48,
                                        background: 'var(--bg-card)',
                                        border: `2px dashed ${file ? 'var(--accent)' : 'var(--border)'}`,
                                        borderRadius: 14,
                                        textAlign: 'center',
                                        cursor: 'pointer',
                                        transition: 'all 0.2s',
                                    }}
                                    onMouseEnter={e => { if (!file) e.currentTarget.style.borderColor = 'var(--text-muted)'; }}
                                    onMouseLeave={e => { if (!file) e.currentTarget.style.borderColor = 'var(--border)'; }}
                                >
                                    {file ? (
                                        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 12 }}>
                                            <span style={{ color: 'var(--accent)' }}><FileIcon size={24} /></span>
                                            <div>
                                                <div style={{ fontWeight: 500 }}>{file.name}</div>
                                                <div className="mono" style={{ fontSize: 12, color: 'var(--text-muted)', marginTop: 2 }}>
                                                    {(file.size / 1024).toFixed(1)} KB
                                                </div>
                                            </div>
                                            <button
                                                onClick={e => { e.stopPropagation(); setFile(null); }}
                                                style={{
                                                    background: 'none', border: 'none', color: 'var(--text-muted)',
                                                    cursor: 'pointer', padding: 4,
                                                }}
                                            >
                                                <XIcon size={18} />
                                            </button>
                                        </div>
                                    ) : (
                                        <>
                                            <div style={{ color: 'var(--text-muted)', marginBottom: 12 }}>
                                                <UploadIcon size={32} />
                                            </div>
                                            <p style={{ color: 'var(--text-secondary)', fontSize: 15 }}>
                                                Drop a PDF here or click to browse
                                            </p>
                                            <p className="mono" style={{ color: 'var(--text-muted)', fontSize: 12, marginTop: 6 }}>
                                                PDF files only · Max 20,000 words
                                            </p>
                                        </>
                                    )}
                                </div>
                                <input
                                    ref={fileInputRef}
                                    type="file"
                                    accept=".pdf"
                                    style={{ display: 'none' }}
                                    onChange={e => {
                                        const f = e.target.files?.[0];
                                        if (f) setFile(f);
                                    }}
                                />
                            </div>
                        )}

                        {/* Error Display */}
                        {mode === 'error' && (
                            <div style={{
                                marginTop: 16, padding: '14px 18px', borderRadius: 10,
                                background: 'var(--risk-high-bg)', border: '1px solid var(--risk-high-border)',
                                display: 'flex', alignItems: 'flex-start', gap: 10,
                            }}>
                                <span style={{ color: 'var(--risk-high)', flexShrink: 0, marginTop: 1 }}>
                                    <AlertIcon size={16} />
                                </span>
                                <span style={{ fontSize: 14, color: 'var(--risk-high)' }}>{error}</span>
                            </div>
                        )}

                        {/* Submit */}
                        <button
                            onClick={handleAnalyze}
                            disabled={!canSubmit}
                            className="animate-fade-up"
                            style={{
                                animationDelay: '200ms',
                                width: '100%', padding: '14px 24px', marginTop: 20,
                                borderRadius: 12, border: 'none',
                                background: canSubmit
                                    ? 'linear-gradient(135deg, var(--accent), #9b8aff)'
                                    : 'var(--bg-surface)',
                                color: canSubmit ? '#fff' : 'var(--text-muted)',
                                fontSize: 15, fontWeight: 600,
                                cursor: canSubmit ? 'pointer' : 'not-allowed',
                                transition: 'all 0.2s',
                                boxShadow: canSubmit ? '0 4px 24px rgba(124,106,239,0.25)' : 'none',
                            }}
                            onMouseEnter={e => { if (canSubmit) e.currentTarget.style.transform = 'translateY(-1px)'; }}
                            onMouseLeave={e => { e.currentTarget.style.transform = 'translateY(0)'; }}
                        >
                            <span style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8 }}>
                                <ShieldIcon size={18} />
                                Analyze Document
                            </span>
                        </button>

                        {/* Disclaimer */}
                        <p className="animate-fade-up" style={{
                            animationDelay: '250ms',
                            textAlign: 'center', fontSize: 12, color: 'var(--text-muted)',
                            marginTop: 20, lineHeight: 1.5,
                        }}>
                            Documents are processed in-memory and not stored.
                            This tool does not provide legal advice.
                        </p>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
